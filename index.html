<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>22YARDS | Elite Cricket Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700;800&family=Bebas+Neue&family=Outfit:wght@400;600;800;900&family=Teko:wght@300;400;700&family=Courier+Prime:wght@400;700&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* T20 Night Match Palette */
            --stadium-night: #020617;
            --electric-cyan: #00F0FF;
            --turf-green: #39FF14;
            --midnight-blue: #0f172a;
            --deep-black: #000000;
        }

        body {
            background: var(--stadium-night);
            color: #F8FAFC;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        .font-numbers { font-family: 'Space Grotesk', sans-serif; }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 0% 0%, rgba(0, 240, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 0%, rgba(0, 240, 255, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 1000;
        }

        .mesh-texture {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 4px 4px;
            z-index: -1;
            opacity: 0.5;
        }

        .font-heading { font-family: 'Teko', sans-serif; text-transform: uppercase; }
        .font-brand { font-family: 'Outfit', sans-serif; font-weight: 900; }
        .font-mono-drs { font-family: 'Courier Prime', monospace; }
        
        .logo-neon {
            background: linear-gradient(
              to bottom right,
              #00F0FF 0%,
              #39FF14 50%,
              #00F0FF 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer-neon 4s linear infinite;
        }

        @keyframes shimmer-neon {
            to { background-position: 200% center; }
        }

        .glass-luxury {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.9);
        }

        .glass-premium {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .app-frame {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .scroll-container::-webkit-scrollbar { display: none; }
        .scroll-container { -ms-overflow-style: none; scrollbar-width: none; overflow-y: auto; height: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* ------ LIGHT MODE THEME --------------------------------------------------------------------------------------------------------------------------------- */
        html[data-theme="light"] body {
            background: #f0f4f8 !important;
            color: #0f172a !important;
        }
        html[data-theme="light"] body::after {
            background:
                radial-gradient(circle at 0% 0%, rgba(0, 180, 200, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 100% 0%, rgba(0, 180, 200, 0.04) 0%, transparent 40%) !important;
        }
        html[data-theme="light"] .mesh-texture {
            opacity: 0.12 !important;
            background-image: radial-gradient(rgba(0,0,0,0.06) 1px, transparent 1px) !important;
        }
        html[data-theme="light"] .glass-luxury {
            background: #ffffff !important;
            border: 1px solid rgba(204,16,16,0.2) !important;
            box-shadow: 0 8px 32px rgba(15,23,42,0.1), 0 1px 4px rgba(15,23,42,0.06) !important;
        }
        html[data-theme="light"] .glass-premium {
            background: #ffffff !important;
            border: 1px solid rgba(15, 23, 42, 0.12) !important;
            box-shadow: 0 4px 16px rgba(15,23,42,0.07), 0 1px 3px rgba(15,23,42,0.05) !important;
        }

        /* Backgrounds */

        html[data-theme="light"] .border-\[\#00F0FF\]\/30 { border-color: rgba(204,16,16,0.3) !important; }

        html[data-theme="light"] .hover\:text-\[\#00F0FF\]:hover { color: #CC1010 !important; }

        /* ------ HEADING / FONT visibility in light mode ------------------------------------------------------------ */
        html[data-theme="light"] .font-heading { color: #0f172a; }

        html[data-theme="light"] h3, html[data-theme="light"] h4 { color: #0f172a; }
        /* Logo still keeps gradient */
        html[data-theme="light"] .logo-neon { -webkit-text-fill-color: transparent; }

        /* ------ CHART VISIBILITY in light mode ------------------------------------------------------------------------------------ */

        html[data-theme="light"] .recharts-label { fill: #374151 !important; }
        html[data-theme="light"] .recharts-cartesian-axis-tick-value { fill: #6b7280 !important; }
        html[data-theme="light"] .recharts-cartesian-axis-line,
        html[data-theme="light"] .recharts-cartesian-axis-tick-line { stroke: #d1d5db !important; }
        html[data-theme="light"] .recharts-cartesian-grid line { stroke: rgba(15,23,42,0.08) !important; }
        html[data-theme="light"] .recharts-tooltip-wrapper .recharts-default-tooltip {
            background-color: #ffffff !important; border: 1px solid #e5e7eb !important;
        }
        html[data-theme="light"] .recharts-tooltip-item { color: #374151 !important; }
        html[data-theme="light"] .recharts-legend-item-text { color: #374151 !important; }

        /* ------ GRADIENT RING / from-to overrides --- red --------------------------------------------------------- */

            --tw-gradient-from: #CC1010 !important;

        }
        html[data-theme="light"] .to-\[\#39FF14\] {
            --tw-gradient-to: #991b1b !important;
        }
        html[data-theme="light"] .via-transparent {
            --tw-gradient-stops: var(--tw-gradient-from), transparent, var(--tw-gradient-to) !important;
        }
        /* Also catch any from-[#4DB6AC] teal gradients */
        html[data-theme="light"] .from-\[\#4DB6AC\] {
            --tw-gradient-from: #b91c1c !important;
            --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(185,28,28,0)) !important;
        }

        html[data-theme="light"] .shadow-\[0_0_20px_rgba\(57\,255\,20\,0\.08\)\]  { box-shadow: 0 0 20px rgba(204,16,16,0.08) !important; }

        html[data-theme="light"] .shadow-\[0_0_15px_rgba\(57\,255\,20\,0\.5\)\]   { box-shadow: 0 0 15px rgba(204,16,16,0.35) !important; }
        /* Dark-green innings header bg */
